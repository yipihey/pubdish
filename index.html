// ── arXiv resolution ──────────────────────────────────────────────────────────
function resolveInput(raw) {
  var s = raw.trim();
  if (/^\d{4}\.\d{4,5}$/.test(s) || /^[a-z-]+\/\d{7}$/.test(s))
    return { pdfUrl: "https://arxiv.org/pdf/" + s, arxivId: s };
  var idMatch = s.match(/arxiv[:\s]+([^\s]+)/i);
  if (idMatch) return { pdfUrl: "https://arxiv.org/pdf/" + idMatch[1], arxivId: idMatch[1] };
  var absMatch = s.match(/arxiv\.org\/abs\/([^\s?#]+)/i);
  if (absMatch) return { pdfUrl: "https://arxiv.org/pdf/" + absMatch[1], arxivId: absMatch[1] };
  var pdfMatch = s.match(/arxiv\.org\/pdf\/([^\s?#]+)/i);
  if (pdfMatch) return { pdfUrl: "https://arxiv.org/pdf/" + pdfMatch[1], arxivId: pdfMatch[1] };
  if (s.indexOf("http") === 0) return { pdfUrl: s, arxivId: null };
  return null;
}

var PROXIES = [
  function(u) { return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
  function(u) { return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
  function(u) { return "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u); },
  function(u) { return "https://thingproxy.freeboard.io/fetch/" + u; },
];

function fetchPdfWithFallback(pdfUrl, onStatus) {
  var i = 0;
  function tryNext() {
    if (i >= PROXIES.length) return Promise.reject(new Error("All proxies failed"));
    var url = PROXIES[i](pdfUrl);
    onStatus("Trying proxy " + (i + 1) + " of " + PROXIES.length + "\u2026");
    i++;
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, 15000);
    return fetch(url, { signal: controller.signal }).then(function(r) {
      clearTimeout(timer);
      if (!r.ok) return tryNext();
      return r.arrayBuffer().then(function(buf) {
        if (buf.byteLength < 1000) return tryNext();
        var header = new Uint8Array(buf.slice(0, 5));
        var str = "";
        for (var j = 0; j < 5; j++) str += String.fromCharCode(header[j]);
        if (str !== "%PDF-") return tryNext();
        return buf;
      });
    }).catch(function() {
      clearTimeout(timer);
      return tryNext();
    });
  }
  return tryNext();
}

// ── PDF text extraction ───────────────────────────────────────────────────────
function extractPdfText(pdfDoc, maxChars) {
  maxChars = maxChars || 24000;
  var text = "";
  var p = 1;
  function nextPage() {
    if (p > pdfDoc.numPages || text.length >= maxChars) return Promise.resolve(text.slice(0, maxChars));
    return pdfDoc.getPage(p).then(function(page) {
      return page.getTextContent().then(function(content) {
        text += content.items.map(function(it) { return it.str; }).join(" ") + "\n\n";
        p++;
        return nextPage();
      });
    });
  }
  return nextPage();
}

function buildSystemPrompt(text, meta) {
  var paperInfo = "";
  if (meta && meta.arxivId) paperInfo = " Paper: arXiv:" + meta.arxivId;
  else if (meta && meta.title) paperInfo = ' Paper: "' + meta.title + '"';
  return "You are an expert guide embedded in an interactive scientific paper reader." + paperInfo + "\n\nFULL PAPER TEXT (extracted):\n" + text + "\n\nYour role: help the reader navigate, understand, and engage with this paper.\n\n- Answer questions about content, methods, results, and significance\n- Point to specific sections or figures when relevant\n- Explain jargon at the level of a physics/astrophysics researcher\n- Be concise and precise\n- When asked to summarize, highlight key contributions and main results";
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(tag, attrs, children) {
  var node = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === "style" && typeof attrs[k] === "object") {
        Object.keys(attrs[k]).forEach(function(sk) { node.style[sk] = attrs[k][sk]; });
      } else if (k === "className") {
        node.className = attrs[k];
      } else if (k.indexOf("on") === 0) {
        node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === "disabled") {
        node.disabled = attrs[k];
      } else if (k === "value") {
        node.value = attrs[k];
      } else if (k === "placeholder") {
        node.placeholder = attrs[k];
      } else if (k === "type") {
        node.type = attrs[k];
      } else if (k === "accept") {
        node.accept = attrs[k];
      } else if (k === "innerHTML") {
        node.innerHTML = attrs[k];
      } else {
        node.setAttribute(k, attrs[k]);
      }
    });
  }
  if (children !== undefined && children !== null) {
    if (typeof children === "string") {
      node.textContent = children;
    } else if (Array.isArray(children)) {
      children.forEach(function(c) { if (c) node.appendChild(c); });
    } else if (children instanceof Node) {
      node.appendChild(children);
    }
  }
  return node;
}

function setStyles(node, styles) {
  Object.keys(styles).forEach(function(k) { node.style[k] = styles[k]; });
}

function clearEl(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function loadingDots() {

  }
  return wrap;
}

function renderCallout(a) {
  var outer = el("div", { style: {
    position: "absolute", left: (a.xFrac * 100) + "%", top: (a.yFrac * 100) + "%",
    width: "155px", background: "rgba(6,8,20,0.95)",
    border: "1.5px solid " + a.color, borderRadius: "3px",
    padding: "7px 9px 8px", transform: "rotate(" + a.rotate + "deg)",
    zIndex: "20", pointerEvents: "none",
    boxShadow: "0 4px 20px rgba(0,0,0,0.7), 0 0 0 1px " + a.color + "18",
  } }, [
    el("div", { style: { fontFamily: "'Caveat',cursive", fontSize: "13px", fontWeight: "700", color: a.color, marginBottom: "3px", lineHeight: "1" } }, a.label),
    el("div", { style: { fontFamily: "'Caveat',cursive", fontSize: "12px", color: "rgba(210,220,255,0.85)", lineHeight: "1.45" } }, a.text),
  ]);
  return outer;
}

function renderPdfPage(pdfDoc, pageNum, skimMode, annotations) {
  var annots = annotations.filter(function(a) { return a.page === pageNum; });
  var wrapper = el("div", { style: { position: "relative", width: "100%", marginBottom: "24px" } });
  var label = el("div", { style: {
    fontSize: "10px", color: "#374151", textAlign: "center", letterSpacing: "0.15em",
    marginBottom: "5px", fontFamily: "monospace",
  } }, "\u2014 " + pageNum + " \u2014");
  var canvasWrap = el("div", { style: { position: "relative" } });
  var canvas = el("canvas", { style: {
    width: "100%", display: "block", borderRadius: "2px",
    filter: skimMode ? "brightness(0.38) saturate(0.08)" : "brightness(0.96)",
    transition: "filter 0.4s ease",
  } });
  canvasWrap.appendChild(canvas);
  if (skimMode) {
    annots.forEach(function(a) { canvasWrap.appendChild(renderCallout(a)); });
  }
  wrapper.appendChild(label);
  wrapper.appendChild(canvasWrap);

  // Render page to canvas
  pdfDoc.getPage(pageNum).then(function(page) {
    var vp = page.getViewport({ scale: 2.0 });
    canvas.width = vp.width;
    canvas.height = vp.height;
    page.render({ canvasContext: canvas.getContext("2d"), viewport: vp });
  });

  return wrapper;
}

  // Messages area
  var msgsArea = el("div", { style: {
    flex: "1", overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px",
  } });
  state.messages.forEach(function(m) {
    var row = el("div", { style: {
      display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start",
      marginBottom: "10px",
    } });
    row.appendChild(el("div", { style: {
      maxWidth: "88%", padding: "10px 14px",
      borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "4px 18px 18px 18px",
      background: m.role === "user" ? "linear-gradient(135deg,#1d4ed8,#2563eb)" : "rgba(28,32,52,0.95)",
      border: m.role === "assistant" ? "1px solid rgba(99,102,241,0.2)" : "none",
      color: "#e2e8f0", fontSize: "13px", lineHeight: "1.6", whiteSpace: "pre-wrap",
    } }, m.content));
    msgsArea.appendChild(row);
  });
  if (state.chatLoading) {
    var dotsWrap = el("div", { style: { display: "flex", gap: "5px", padding: "4px 0" } });
    for (var i = 0; i < 3; i++) {
      dotsWrap.appendChild(el("div", { style: {
        width: "6px", height: "6px", borderRadius: "50%", background: "#6366f1",
        animation: "kp 1.2s ease " + (i * 0.2) + "s infinite",
      } }));
    }
    msgsArea.appendChild(dotsWrap);
  }
  // Scroll sentinel
  var sentinel = el("div");
  msgsArea.appendChild(sentinel);
  panel.appendChild(msgsArea);

  // Suggested questions
  if (state.messages.length <= 1) {
    var suggestWrap = el("div", { style: {
      padding: "0 16px 10px", display: "flex", flexWrap: "wrap", gap: "6px",
    } });
    ["Key result?", "Explain the method", "Main figures?", "Literature context?"].forEach(function(q) {
      suggestWrap.appendChild(el("button", {
        onClick: function() { state.input = q; render(); },
        style: {
          padding: "5px 10px", borderRadius: "20px",
          border: "1px solid rgba(99,102,241,0.3)",
          background: "rgba(99,102,241,0.08)", color: "#a5b4fc",
          cursor: "pointer", fontSize: "11px",
        },
      }, q));
    });
    panel.appendChild(suggestWrap);
  }

  // Input bar
  var inputBar = el("div", { style: {
    padding: "10px 12px", borderTop: "1px solid rgba(99,102,241,0.12)",
    display: "flex", gap: "8px", flexShrink: "0",
  } });
  var chatInput = el("input", {
    value: state.input,
    placeholder: "Ask about the paper\u2026",
    onInput: function(e) { state.input = e.target.value; },
    onKeydown: function(e) { if (e.key === "Enter") sendMessage(); },
    style: {
      flex: "1", padding: "11px 16px", borderRadius: "24px",
      border: "1px solid rgba(99,102,241,0.28)", background: "rgba(12,15,36,0.9)",
      color: "#e2e8f0", fontSize: "16px", outline: "none",
    },
  });
  var sendBtn = el("button", {
    disabled: state.chatLoading,
    onClick: sendMessage,
    style: {
      width: "44px", height: "44px", borderRadius: "50%", border: "none",
      background: state.chatLoading ? "#1e293b" : "linear-gradient(135deg,#4f46e5,#7c3aed)",
      color: "white", fontSize: "18px",
      cursor: state.chatLoading ? "not-allowed" : "pointer",
      flexShrink: "0",
      boxShadow: state.chatLoading ? "none" : "0 0 18px rgba(99,102,241,0.35)",
    },
  }, "\u2191");
  inputBar.appendChild(chatInput);
  inputBar.appendChild(sendBtn);
  panel.appendChild(inputBar);

  // Scroll to bottom after mount
  setTimeout(function() { sentinel.scrollIntoView({ behavior: "smooth" }); }, 0);

  return panel;
}

function render() {
  clearEl(root);
  var paper = state.paper;
  var isMobile = state.isMobile;

  var outer = el("div", { style: {
    display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden",
  } });

  // Header (when paper loaded)
  if (paper) {
    var header = el("header", { style: {
      display: "flex", alignItems: "center", padding: "10px 16px",
      background: "rgba(10,12,28,0.98)",
      borderBottom: "1px solid rgba(99,102,241,0.16)",
      flexShrink: "0", gap: "12px", zIndex: "40",
    } });
    header.appendChild(el("div", { style: {
      width: "3px", height: "32px", borderRadius: "2px",
      background: "linear-gradient(to bottom,#6366f1,#8b5cf6)", flexShrink: "0",
    } }));

    var titleBlock = el("div", { style: { flex: "1", minWidth: "0" } });
    titleBlock.appendChild(el("div", { style: {
      fontSize: "13px", fontWeight: "500", color: "#c7d2fe",
      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
    } }, paper.meta && paper.meta.arxivId ? "arXiv:" + paper.meta.arxivId : (paper.meta && paper.meta.title || "Paper")));
    titleBlock.appendChild(el("div", { style: {
      fontSize: "10px", color: "#334155", letterSpacing: "0.05em",
      marginTop: "1px", fontFamily: "monospace",
    } }, paper.doc.numPages + " pages \u00B7 " + (paper.annotations.length > 0 ? "skim annotations active" : "generic skim mode")));
    header.appendChild(titleBlock);

    // Open button
    var openBtn = el("button", {
      onClick: function() { state.paper = null; state.showChat = false; render(); },
      style: Object.assign({}, btnStyle(false, "#64748b"), { fontSize: "11px", padding: "5px 10px" }),
    }, "\u21A9" + (isMobile ? "" : " Open"));
    header.appendChild(openBtn);

    // Skim/Full toggle
    var skimBtn = el("button", {
      onClick: function() { state.skimMode = !state.skimMode; render(); },
      style: btnStyle(state.skimMode, "#34D399"),
    });
    skimBtn.appendChild(el("span", null, state.skimMode ? "\u270F\uFE0F" : "\uD83D\uDCC4"));
    if (!isMobile) skimBtn.appendChild(el("span", null, state.skimMode ? "Skim" : "Full"));
    header.appendChild(skimBtn);

    // Chat toggle
    var chatBtn = el("button", {
      onClick: function() { state.showChat = !state.showChat; render(); },
      style: btnStyle(state.showChat, "#a5b4fc"),
    });
    chatBtn.appendChild(el("span", null, "\uD83D\uDCAC"));
    if (!isMobile) chatBtn.appendChild(el("span", null, "Guide"));
    header.appendChild(chatBtn);

    outer.appendChild(header);
  }

  // Main content area
  var main = el("div", { style: {
    display: "flex", flex: "1", overflow: "hidden", position: "relative",
  } });

  var scrollArea = el("div", { style: {
    flex: "1", overflowY: "auto", WebkitOverflowScrolling: "touch",
    padding: paper ? (isMobile ? "16px 12px" : "24px 32px") : "0",
    display: "flex", flexDirection: "column", alignItems: "center",
    background: "radial-gradient(ellipse at 50% 0%,rgba(28,32,65,0.4) 0%,#080a16 65%)",
  } });

  if (!paper) {
    scrollArea.appendChild(renderLoadScreen());
  } else {
    var pagesWrap = el("div", { style: { width: "100%", maxWidth: "680px" } });
    for (var i = 1; i <= paper.doc.numPages; i++) {
      pagesWrap.appendChild(renderPdfPage(paper.doc, i, state.skimMode, paper.annotations));
    }
    scrollArea.appendChild(pagesWrap);
  }
  main.appendChild(scrollArea);

  if (state.showChat && paper) {
    main.appendChild(renderChatPanel());
  }

  outer.appendChild(main);
  root.appendChild(outer);
}

// ── Actions ───────────────────────────────────────────────────────────────────

function loadFromBuffer(buf, meta) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return pdfjsLib.getDocument({
    data: buf,
    cMapUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/",
    cMapPacked: true,
  }).promise.then(function(doc) {
    state.loadStatus = "Extracting text for AI\u2026";
    render();
    return extractPdfText(doc).then(function(text) {
      var systemPrompt = buildSystemPrompt(text, meta);
      var annotations = (meta && meta.arxivId === "2210.05140") ? DEFAULT_ANNOTATIONS : [];
      handlePaperLoaded({ doc: doc, systemPrompt: systemPrompt, annotations: annotations, meta: meta });
    });
  });
}

function handleUrl() {
  var resolved = resolveInput(state.urlInput);
  if (!resolved) {
    state.loadError = "Try an arXiv ID like 2210.05140, an arXiv URL, or any PDF URL.";
    render();
    return;
  }
  state.loadError = null;
  fetchPdfWithFallback(resolved.pdfUrl, function(s) {
    state.loadStatus = s;
    render();
  }).then(function(buf) {
    state.loadStatus = "Parsing PDF\u2026";
    render();
    return loadFromBuffer(buf, { arxivId: resolved.arxivId, pdfUrl: resolved.pdfUrl });
  }).catch(function() {
    state.loadStatus = null;
    state.loadError = "All proxies failed. Use the file upload below \u2014 download the PDF first, then select it.";
    render();
  });
}

function handleFile(file) {
  if (!file || file.type !== "application/pdf") {
    state.loadError = "Please select a PDF file.";
    render();
    return;
  }
  state.loadError = null;
  state.loadStatus = "Parsing PDF\u2026";
  render();
  file.arrayBuffer().then(function(buf) {
    return loadFromBuffer(buf, { title: file.name.replace(/\.pdf$/i, "") });
  }).catch(function() {
    state.loadError = "Failed to parse PDF.";
    state.loadStatus = null;
    render();
  });
}

function handlePaperLoaded(p) {
  state.paper = p;
  state.messages = [{ role: "assistant", content: "Paper loaded" + (p.meta && p.meta.arxivId ? " (arXiv:" + p.meta.arxivId + ")" : "") + ". Ask me anything \u2014 key results, formalism, figures, or how it fits the literature." }];
  state.showChat = true;
  state.loadStatus = null;
  state.loadError = null;
  state.input = "";
  render();
}

var API_PROXIES = [
  function(u) { return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
  function(u) { return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
];

function sendViaAnthropic(msgPayload) {
  var apiUrl = "https://api.anthropic.com/v1/messages";
  var bodyStr = JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    system: state.paper.systemPrompt,
    messages: msgPayload,
  });

  var attempts = [
    function() {
      return fetch(apiUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": state.apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: bodyStr,
      });
    },
  ];
  API_PROXIES.forEach(function(proxy) {
    attempts.push(function() {
      return fetch(proxy(apiUrl), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": state.apiKey,
          "anthropic-version": "2023-06-01",
        },
        body: bodyStr,
      });
    });
  });

  function tryAttempt(idx) {
    if (idx >= attempts.length) return Promise.reject(new Error("Connection error. Check your API key and try again."));
    return attempts[idx]().then(function(res) {
      return res.json().then(function(data) {
        if (data.error) return Promise.reject(new Error("API error: " + (data.error.message || JSON.stringify(data.error))));
        return (data.content && data.content[0] && data.content[0].text) || "No response.";
      });
    }).catch(function(err) {
      if (err.message && err.message.indexOf("API error") === 0) return Promise.reject(err);
      return tryAttempt(idx + 1);
    });
  }
  return tryAttempt(0);
}

function sendViaOllama(msgPayload) {
  var url = state.ollamaUrl.replace(/\/+$/, "") + "/v1/chat/completions";
  var ollamaMsgs = [{ role: "system", content: state.paper.systemPrompt }].concat(msgPayload);
  return fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: state.ollamaModel,
      messages: ollamaMsgs,
    }),
  }).then(function(res) {
    return res.json().then(function(data) {
      if (data.error) return Promise.reject(new Error("Ollama error: " + (data.error.message || JSON.stringify(data.error))));
      return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "No response.";
    });
  }).catch(function(err) {
    if (err.message && err.message.indexOf("Ollama error") === 0) return Promise.reject(err);
    return Promise.reject(new Error("Cannot reach Ollama at " + state.ollamaUrl + ". Is it running?"));
  });
}

function sendMessage() {
  if (!state.input.trim() || state.chatLoading || !state.paper) return;
  if (state.provider === "anthropic" && !state.apiKey) {
    state.messages.push({ role: "assistant", content: "Please enter your Anthropic API key on the load screen first. (Use the \u21A9 Open button to go back.)" });
    render();
    return;
  }
  var userMsg = { role: "user", content: state.input.trim() };
  state.messages.push(userMsg);
  state.input = "";
  state.chatLoading = true;
  render();

  var msgPayload = state.messages.map(function(m) { return { role: m.role, content: m.content }; });
  var sendFn = state.provider === "ollama" ? sendViaOllama : sendViaAnthropic;

  sendFn(msgPayload).then(function(text) {
    state.messages.push({ role: "assistant", content: text });
    state.chatLoading = false;
    render();
  }).catch(function(err) {
    state.messages.push({ role: "assistant", content: err.message || "Connection error." });
    state.chatLoading = false;
    render();
  });
}

// ── Responsive listener ───────────────────────────────────────────────────────
window.addEventListener("resize", function() {
  var was = state.isMobile;
  state.isMobile = window.innerWidth < 700;
  if (was !== state.isMobile) render();
});

// ── Initial render ────────────────────────────────────────────────────────────
render();
</script>
